<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        fetch("login.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
            },
            body: ("username=&pswd=")
            })
        .then(response => response.text())
        .then(text => {
            console.log(text);
            if(text === "Success") location.href = "../home/";
        })
    </script>
    <title>Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container p-5 my-5 bg-dark text-white rounded">
        <h2 class="text-center">Welcome to the Volunteer Service</h2>
    </div>
    <div class="container mt-3">
        <form action="login.php" method="post">
            <div class="mb-3 mt-3">
                <label for="username">Username:</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username" name="username" onkeypress="javascript: if(event.key == 'Enter') loginSubmit();">
            </div>
            <div class="mb-3">
                <label for="pwd">Password:</label>
                <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd" onkeypress="javascript: if(event.key == 'Enter') loginSubmit();">
            </div>
            <button type="button" id="btn-login" class="btn btn-dark">Login</button>
        </form>
        <div class="mb-2 mt-3">
            <a href="../register" class="btn btn-dark">Register</a>
        </div>
        <p class="text-danger" id="failedlogin"></p>
    </div>

    <script src="login.js"></script>
</body>

</html>
