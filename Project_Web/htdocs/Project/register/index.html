<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        fetch("../login/login.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
            },
            body: ("username=&pswd=")
            })
        .then(response => response.text())
        .then(text => {
            if(text === "Success") location.href = "../home/";
        })
    </script>
    <title>Register</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

     <style>
        #map { height: 400px; }
     </style>
</head>

<body>

    <div class="container p-5 my-5 bg-dark text-white rounded">
        <h2 class="text-center">Register as a Citizen</h2>
    </div>
    <div class="container mt-3">
        <form action="javascript:;" onsubmit="registerSubmit()">
            <div class="mb-3 mt-3">
                <label for="username">Username:</label>
                <input type="text" class="form-control" id="username" placeholder="Enter username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="pwd">Password:</label>
                <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd" required>
            </div>
            <div class="mb-3">
                <label for="fname">First Name:</label>
                <input type="text" class="form-control" id="fname" placeholder="Enter your first name" name="fname" required>
            </div>
            <div class="mb-3">
                <label for="lname">Last Name:</label>
                <input type="text" class="form-control" id="lname" placeholder="Enter your last name" name="lname" required>
            </div>
            <div class="mb-3">
                <label for="phone">Phone:</label>
                <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number (10 digits)" name="phone" pattern="[0-9]{10}" required>
            </div>
            <div class="mb-3">
                <label for="map">Click on your location:</label>
                <div id="map"></div></div>
            <button type="submit" id="btn-register" class="btn btn-dark disabled">Submit</button>
        </form>
        <div class="mb-2 mt-3">
            <a href="../login" class="btn btn-dark">Back</a>
        </div>
        <p class="text-danger" id="failedregister"></p>
    </div>

    <script src="register.js"></script>
</body>

</html>
